databases:
  - name: kultur-db
    databaseName: kultur
    user: kultur_user
    plan: free

services:
  - type: web
    name: kultur-backend
    env: python
    rootDir: backend
    buildCommand: buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: kultur-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # IMPORTANT: You will need to update CORS_ORIGINS in the Render Dashboard
      # with the actual URL of your frontend service once it is generated.
      - key: CORS_ORIGINS
        value: "https://kultur-frontend.onrender.com"
      - key: ENVIRONMENT
        value: "production"

  - type: web
    name: kultur-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
   staticPublishPath: dist 
    envVars:
      - key: VITE_API_BASE_URL
  value: https://kultur-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
